<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo azul profesional -->
  <rect width="200" height="200" fill="#003366"/>

  <!-- Cabeza -->
  <circle cx="100" cy="70" r="35" fill="#d4a574"/>

  <!-- Cabello (elegante, profesional) -->
  <path d="M 65 55 Q 65 35 100 35 Q 135 35 135 55 L 135 70 Q 100 85 65 70 Z" fill="#4a3728"/>

  <!-- Cuello -->
  <rect x="92" y="100" width="16" height="12" fill="#d4a574"/>

  <!-- Hombros y torso (blazer profesional) -->
  <path d="M 60 112 L 55 150 Q 55 160 65 165 L 135 165 Q 145 160 145 150 L 140 112 Z" fill="#003366" stroke="#ffffff" stroke-width="1"/>

  <!-- Blusa blanca interior -->
  <path d="M 90 112 L 92 150 L 108 150 L 110 112 Z" fill="#ffffff"/>

  <!-- Botones del blazer -->
  <circle cx="100" cy="125" r="2.5" fill="#d4a85c"/>
  <circle cx="100" cy="140" r="2.5" fill="#d4a85c"/>

  <!-- Brazos -->
  <ellipse cx="60" cy="130" rx="8" ry="28" fill="#d4a574" transform="rotate(-25 60 130)"/>
  <ellipse cx="140" cy="130" rx="8" ry="28" fill="#d4a574" transform="rotate(25 140 130)"/>

  <!-- Mano derecha con micrófono/teléfono -->
  <circle cx="135" cy="155" r="6" fill="#d4a574"/>
  <rect x="132" y="148" width="6" height="8" fill="#333333" rx="2"/>

  <!-- Ojos -->
  <circle cx="90" cy="65" r="3" fill="#333333"/>
  <circle cx="110" cy="65" r="3" fill="#333333"/>
  <circle cx="91" cy="64" r="1.5" fill="#ffffff"/>
  <circle cx="111" cy="64" r="1.5" fill="#ffffff"/>

  <!-- Cejas -->
  <path d="M 85 60 Q 90 57 95 60" stroke="#4a3728" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 105 60 Q 110 57 115 60" stroke="#4a3728" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Sonrisa profesional -->
  <path d="M 90 72 Q 100 78 110 72" stroke="#333333" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Indicador "en línea" (pequeña raya verde) -->
  <circle cx="155" cy="155" r="8" fill="#10b981"/>
  <circle cx="155" cy="155" r="6.5" fill="#003366"/>
  <path d="M 152 155 L 154 157 L 158 153" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
